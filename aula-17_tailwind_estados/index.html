<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Document</title>
</head>
<body class="m-4">
    <button class="bg-blue-500 hover:bg-blue-700 
    focus:ring-4 active:bg-blue-900 text-white 
    font-bold py-2 px-4 rounded">
    Interaja comigo
    </button>

    <div class="group p-4 bg-gray-100 hover:bg-gray-200 rounded-lg mt-4 w-64">
        <h2 class="text-lg font-bold group-hover:text-blue-500">Título</h2>
        <p class="group-hover:underline">Ado Ado Ado</p>
    </div>

    <div>
        <input type="checkbox" id="mostrar" class="peer hidden">
        <label for="mostrar" class="cursor-pointer text-blue-500">
            Mostrar mensagem
        </label>

        <div class="mt-2 hidden peer-checked:block text-green-600">
            Checkbox Marcado! 🎉
        </div>
    </div>
</body>
</html>
